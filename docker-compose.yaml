version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: appflota-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flota
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    image: ghcr.io/alejandroeml-su/appflota:latest
    container_name: appflota-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flota?sslmode=disable
      JWT_SECRET: super-secret-key-for-mvp
    depends_on:
      - db

volumes:
  postgres_data:
